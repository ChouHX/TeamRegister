version: '3.9'

services:
  register-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-cpa-register
    ports:
      - "8000:8000"
    restart: unless-stopped
    working_dir: /app
    command: ["uvicorn", "app.register_web:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai